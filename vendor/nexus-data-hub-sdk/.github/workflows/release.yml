name: Release to CyberX PyPi
on:
  push:
    branches:
      - master
jobs:
  build_and_release:
    runs-on: [self-hosted, linux, x64]
    steps:
      - 
        uses: actions/checkout@v2
      - 
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - 
        uses: snok/install-poetry@v1
        with:
          version: 1.6.1
          virtualenvs-create: true
          virtualenvs-in-project: true
      - 
        run: poetry install --no-interaction --no-root
      # - 
      #   run: make test
      -
        env:
          POETRY_HTTP_BASIC_CYBERX_USERNAME: ${{ secrets.CYBERX_PYPI_USER }}
          POETRY_HTTP_BASIC_CYBERX_PASSWORD: ${{ secrets.CYBERX_PYPI_PASSWORD }}
        run: |
          make release
          ls -ahl ./dist
