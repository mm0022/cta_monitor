[tool.poetry]
name = "nexus-data-hub-sdk"
version = "2.0.31"
description = "nexus data hub sdk"
authors = ["lowid <soloradish@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.10"
boto3 = "^1.28.48"
psutil = "^5.9.5"
pydantic = ">=1.10.13"
portalocker = "^2.8.2"
pandas = ">=2.0.0"
pyarrow = ">=14.0.0"
httpx = {version = ">=0.25.1,<=0.28.1", extras = ["http2"]}
tomli = "^2.0.1"

[tool.poetry.dev-dependencies]
autopep8 = "^2.0.4"
moto = "^4.2.2"
pytest = "^7.4.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[project]
name = "nexus-data-hub-sdk"
description = "nexus data hub sdk"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["boto3", "psutil", "pydantic", "portalocker", "pandas", "pyarrow", "httpx", "tomli"]
dynamic = ["version"]
